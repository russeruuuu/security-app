name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
        continue-on-error: false

      - name: Run Safety dependency scan
        run: |
          pip install safety
          safety check --output json > safety-report.json || true

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml  # Optional custom config
        continue-on-error: false

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-scans
          path: |
            safety-report.json

  build:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: secure-app:${{ github.sha }}
          load: true

      - name: Get image ID
        run: |
          IMAGE_ID=$(docker images secure-app:${{ github.sha }} --format "table {{.Repository}}:{{.Tag}} {{.ID}}" | tail -n 1 | awk '{print $2}')
          echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'secure-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: secure-app:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Mark as trusted build
        run: |
          echo "Trusted build for commit ${{ github.sha }}" > trusted-build.txt
          echo "Image ID: ${{ env.IMAGE_ID }}" >> trusted-build.txt
          echo "Build timestamp: $(date)" >> trusted-build.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            sbom.cyclonedx.json
            trivy-results.sarif
            trusted-build.txt